---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ml.example.com
  resources:
  - flexperiments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ml.example.com
  resources:
  - flexperiments/finalizers
  verbs:
  - update
- apiGroups:
  - ml.example.com
  resources:
  - flexperiments/status
  verbs:
  - get
  - patch
  - update
